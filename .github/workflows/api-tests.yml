name: build

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build-shareit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shareit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run application in background
        run: |
          java -jar target/shareit-0.0.1-SNAPSHOT.jar \
            --spring.profiles.active=test \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/shareit \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres &
          echo "Waiting for application to start..."
          sleep 30

      - name: Check if application is running
        run: |
          curl --retry 5 --retry-delay 5 --retry-connrefused http://localhost:8080/actuator/health

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: |
          newman run ./tests/postman/sprint.json \
            --delay-request 50 \
            -r cli,htmlextra \
            --verbose \
            --color on \
            --reporter-htmlextra-darkTheme \
            --reporter-htmlextra-export reports/shareIt.html \
            --reporter-htmlextra-title "Отчет по тестам" \
            --reporter-htmlextra-logs true \
            --reporter-htmlextra-template ./tests/.github/workflows/dashboard-template.hbs

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/