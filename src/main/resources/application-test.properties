# Server port
server.port=8080

# Spring Boot Actuator ??? healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# H2 Database (????? ?????????????? ???? ??? PostgreSQL)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ??? ????????? ????? ?????????????? ? Docker ????? ?????????? ?????????
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:shareitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true